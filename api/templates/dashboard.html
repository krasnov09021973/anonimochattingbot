<div class="stats">
    <div class="card"><h3>👥 Users</h3><div class="value" id="total_users">-</div></div>
    <div class="card"><h3>📈 Active 24h</h3><div class="value" id="active_24h">-</div></div>
    <div class="card"><h3>⚠️ Pending Reports</h3><div class="value" id="pending_reports">-</div></div>
</div>

<script>
    console.log('Dashboard loaded');
    fetch('/api/stats')
        .then(res => res.json())
        .then(data => {
            console.log('Stats data:', data);
            document.getElementById('total_users').innerText = data.total_users || 0;
            document.getElementById('active_24h').innerText = data.active_24h || 0;
            document.getElementById('pending_reports').innerText = data.pending_reports || 0;
        })
        .catch(err => console.error('Error:', err));
</script>
